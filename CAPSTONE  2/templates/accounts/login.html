{% extends "base.html" %}
{% block title %}Sign In — MSHFI{% endblock %}

{% block extra_head %}
<style>
  .hp-field input {
    background-color: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    padding: 0 !important;
  }
  .hp-field input:focus {
    box-shadow: none !important;
  }
  .hp-field input::placeholder {
    color: #9CA3AF !important;
  }
</style>
{% endblock %}

{% block body %}
<div class="min-h-screen bg-gradient-to-b from-white via-brand-50/50 to-secondary-50 flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-sm animate-fade-up">

    <div class="flex flex-col items-center mb-8">
      <div class="flex size-16 items-center justify-center rounded-3xl bg-brand-500 text-white shadow-soft mb-4">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 3a1 1 0 00-1 1v5a1 1 0 01-1 1H4a1 1 0 00-1 1v2a1 1 0 001 1h5a1 1 0 011 1v5a1 1 0 001 1h2a1 1 0 001-1v-5a1 1 0 011-1h5a1 1 0 001-1v-2a1 1 0 00-1-1h-5a1 1 0 01-1-1V4a1 1 0 00-1-1h-2z"/></svg>
      </div>
      <h1 class="text-2xl font-semibold text-ink">Welcome back</h1>
      <p class="text-ink-soft text-sm mt-1">Sign in to MSHFI Medical Appointment System</p>
    </div>

    <div class="bg-white rounded-3xl shadow-soft p-6 sm:p-7">
      <form method="post" class="space-y-3 hp-field">
        {% csrf_token %}

        <div class="flex items-center gap-2.5 bg-softgray rounded-xl px-4 py-3.5 border border-transparent focus-within:border-brand-300 focus-within:ring-2 focus-within:ring-brand-500/15 transition">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input type="text" name="username" required autofocus
                 class="flex-1 bg-transparent border-0 p-0 text-sm text-ink placeholder-gray-400 focus:outline-none focus:ring-0"
                 placeholder="Username" />
        </div>

        <div class="flex items-center gap-2.5 bg-softgray rounded-xl px-4 py-3.5 border border-transparent focus-within:border-brand-300 focus-within:ring-2 focus-within:ring-brand-500/15 transition">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm6-2V8a6 6 0 10-12 0v1m-1 0h14a1 1 0 011 1v9a2 2 0 01-2 2H6a2 2 0 01-2-2v-9a1 1 0 011-1z"/>
          </svg>
          <input type="password" name="password" required
                 class="flex-1 bg-transparent border-0 p-0 text-sm text-ink placeholder-gray-400 focus:outline-none focus:ring-0"
                 placeholder="Password" />
        </div>

        <button type="submit" data-loading-text="Signing in…"
                class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-3.5 px-4 rounded-xl text-sm transition-all duration-200 hover:shadow-soft-sm disabled:opacity-60 disabled:cursor-not-allowed !mt-5">
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-ink-soft mt-6">
      New patient? <a href="{% url 'accounts:register' %}" class="text-brand-600 font-medium hover:text-brand-700 hover:underline">Create an account</a>
    </p>
    <p class="text-center mt-3">
      <a href="/" class="text-xs text-gray-400 hover:text-ink-soft transition-colors">&larr; Back to home</a>
    </p>
  </div>
</div>
{% endblock %}
