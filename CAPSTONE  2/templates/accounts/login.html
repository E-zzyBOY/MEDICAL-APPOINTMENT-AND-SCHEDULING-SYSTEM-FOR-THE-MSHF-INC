{% extends "base.html" %}
{% block title %}Sign In — MSHFI{% endblock %}

{% block extra_head %}
<style>
  .hp-field input {
    background-color: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    padding: 0 !important;
  }
  .hp-field input:focus {
    box-shadow: none !important;
  }
  .hp-field input::placeholder {
    color: #9a9aa5 !important;
  }
</style>
{% endblock %}

{% block body %}
<div class="min-h-screen bg-white flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-sm">

    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-full bg-[#F1EFE8] border border-dashed border-[#B4B2A9] flex items-center justify-center mb-4">
        <svg class="w-6 h-6 text-[#9a9a92]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 16.5v-9a2 2 0 012-2h2.379a2 2 0 001.415-.586l1.172-1.172a2 2 0 011.415-.586h3.238a2 2 0 011.415.586l1.172 1.172a2 2 0 001.415.586H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <circle cx="12" cy="12" r="3.5" stroke-width="1.5"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-[#161622]">Sign in</h1>
      <p class="text-[#9a9aa5] text-sm mt-1">MSHFI Medical Appointment System</p>
    </div>

    <form method="post" class="space-y-3 hp-field">
      {% csrf_token %}

      <div class="flex items-center gap-2.5 bg-[#F5F5F7] rounded-xl px-4 py-3.5">
        <svg class="w-4 h-4 text-[#9a9aa5] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <input type="text" name="username" required autofocus
               class="flex-1 bg-transparent border-0 p-0 text-sm text-[#161622] placeholder-[#9a9aa5] focus:outline-none focus:ring-0"
               placeholder="Username" />
      </div>

      <div class="flex items-center gap-2.5 bg-[#F5F5F7] rounded-xl px-4 py-3.5">
        <svg class="w-4 h-4 text-[#9a9aa5] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm6-2V8a6 6 0 10-12 0v1m-1 0h14a1 1 0 011 1v9a2 2 0 01-2 2H6a2 2 0 01-2-2v-9a1 1 0 011-1z"/>
        </svg>
        <input type="password" name="password" required
               class="flex-1 bg-transparent border-0 p-0 text-sm text-[#161622] placeholder-[#9a9aa5] focus:outline-none focus:ring-0"
               placeholder="Password" />
      </div>

      <button type="submit" data-loading-text="Signing in…"
              class="w-full bg-[#161622] hover:bg-[#22222f] text-white font-medium py-3.5 px-4 rounded-xl text-sm transition disabled:opacity-60 disabled:cursor-not-allowed mt-5">
        Sign in
      </button>
    </form>

    <p class="text-center text-sm text-[#9a9aa5] mt-6">
      New patient? <a href="{% url 'accounts:register' %}" class="text-[#161622] font-medium hover:underline">Create an account</a>
    </p>
    <p class="text-center mt-3">
      <a href="/" class="text-xs text-[#c1c1c8] hover:text-[#9a9aa5]">&larr; Back to home</a>
    </p>
  </div>
</div>
{% endblock %}
