{% extends "components/modal.html" %}
{% block modal_content %}
<form method="post" action="{% url 'admin_panel:appointment_edit' pk=appt.pk %}"
      hx-post="{% url 'admin_panel:appointment_edit' pk=appt.pk %}"
      hx-target="#modal-root" hx-swap="innerHTML"
      class="space-y-4">
  {% csrf_token %}
  {% if form.non_field_errors %}
  <p class="text-red-600 text-sm bg-red-50 p-3 rounded">{{ form.non_field_errors.0 }}</p>
  {% endif %}
  {% for field in form %}
  <div>
    <label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}<p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
  </div>
  {% endfor %}
  <div class="flex gap-3 pt-4">
    <button type="submit" class="flex-1 bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition">
      Save Changes
    </button>
    <button type="button" onclick="closeModal()" class="flex-1 border border-gray-300 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-50 transition">
      Cancel
    </button>
  </div>
</form>
{% endblock %}
