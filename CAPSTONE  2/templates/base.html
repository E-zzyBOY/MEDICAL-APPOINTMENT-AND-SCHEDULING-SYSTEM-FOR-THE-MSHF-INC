<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MSHFI Medical Appointment System{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    // Back/Forward navigation can restore a page from the browser's
    // in-memory bfcache without making a new request at all, bypassing the
    // server's Cache-Control headers entirely. Forcing a reload whenever a
    // page is restored this way guarantees a fresh request hits the server,
    // so a dead session gets redirected to login instead of showing stale content.
    window.addEventListener('pageshow', function (event) {
      if (event.persisted) {
        window.location.reload();
      }
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/js/htmx.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Fixed brand palette — same 4 colors used across every role's portal.
            brand: {
              900: '#112E81',
              700: '#4647AE',
              500: '#4382DF',
              200: '#AACCD6',
              50:  '#EEF4FA',
            },
            medical: {
              blue:  '#2563EB',
              soft:  '#EFF6FF',
            },
            slate: {
              400: '#94A3B8',
              500: '#64748B',
              600: '#475569',
            },
            emerald: {
              500: '#10B981',
            },
            soft: {
              red: '#EF4444',
            },
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
          keyframes: {
            'fade-up': {
              '0%':   { opacity: 0, transform: 'translateY(6px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%':      { transform: 'translateY(-10px)' },
            },
            'card-in': {
              '0%':   { opacity: 0, transform: 'translateY(20px) scale(0.97)' },
              '100%': { opacity: 1, transform: 'translateY(0) scale(1)' },
            },
          },
          animation: {
            'fade-up': 'fade-up 0.35s ease-out both',
            'float':   'float 4s ease-in-out infinite',
            'card-in': 'card-in 0.5s ease-out forwards',
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/custom.css" />
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen font-inter">

  <!-- Flash Messages -->
  {% if messages %}
  <div class="fixed top-4 right-4 z-50 space-y-2 max-w-sm w-full">
    {% for message in messages %}
    <div class="flex items-start gap-3 px-4 py-3 rounded-lg shadow-lg
      {% if message.tags == 'error' %}bg-red-500 text-white
      {% elif message.tags == 'success' %}bg-green-500 text-white
      {% elif message.tags == 'warning' %}bg-yellow-400 text-gray-900
      {% else %}bg-blue-500 text-white{% endif %}">
      <span class="flex-1 text-sm font-medium">{{ message }}</span>
      <button onclick="this.parentElement.remove()" class="text-white/80 hover:text-white font-bold leading-none">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Modal Root Container -->
  <div id="modal-root"></div>

  {% block body %}{% endblock %}

  {% block extra_js %}{% endblock %}

  <script>
    // Modal management: open/close, focus trap, and htmx triggers
    let modalTrigger = null;

    function getFocusable(container) {
      return Array.from(container.querySelectorAll(
        'a[href], button:not([disabled]), textarea, input:not([type="hidden"]), select, [tabindex]:not([tabindex="-1"])'
      ));
    }

    function openModal() {
      const modal = document.getElementById('modal-overlay');
      if (!modal) return;
      modal.classList.add('open');
      const focusables = getFocusable(modal);
      (focusables[0] || modal).focus();
    }

    function closeModal() {
      const modal = document.getElementById('modal-overlay');
      if (modal) {
        modal.classList.remove('open');
        setTimeout(() => {
          document.getElementById('modal-root').innerHTML = '';
          if (modalTrigger && document.body.contains(modalTrigger)) {
            modalTrigger.focus();
          }
          modalTrigger = null;
        }, 300); // Match transition duration
      }
    }

    // Remember what had focus before a modal-opening htmx request fires,
    // so closeModal() can restore it (keyboard users would otherwise land on <body>).
    document.body.addEventListener('htmx:beforeRequest', function(event) {
      if (event.detail.target && event.detail.target.id === 'modal-root') {
        modalTrigger = document.activeElement;
      }
    });

    // Close modal on backdrop click
    document.addEventListener('click', function(event) {
      const modal = document.getElementById('modal-overlay');
      if (event.target === modal) {
        closeModal();
      }
    });

    // Close on Escape key; trap Tab focus while a modal is open
    document.addEventListener('keydown', function(event) {
      const modal = document.getElementById('modal-overlay');
      if (!modal || !modal.classList.contains('open')) return;

      if (event.key === 'Escape') {
        closeModal();
        return;
      }
      if (event.key !== 'Tab') return;

      const focusables = getFocusable(modal);
      if (focusables.length === 0) return;
      const first = focusables[0];
      const last = focusables[focusables.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    });

    // Auto-open modal when content is swapped into #modal-root
    document.body.addEventListener('htmx:afterSettle', function(event) {
      if (event.detail.target.id === 'modal-root') {
        openModal();
      }
    });

    // Account popover dropdowns (top-right avatar on desktop, bottom-tab "Menu" on mobile) —
    // independent of the modal system above. Both share the [data-dropdown-menu] marker so
    // outside-click/Escape handling works the same no matter how many triggers are on the page.
    function toggleDropdown(dropdownId) {
      const dropdown = document.getElementById(dropdownId);
      if (dropdown) dropdown.classList.toggle('hidden');
    }

    document.addEventListener('click', function(event) {
      document.querySelectorAll('[data-dropdown-menu]').forEach(function(dropdown) {
        const trigger = document.getElementById(dropdown.dataset.trigger);
        if (trigger && !trigger.contains(event.target)) {
          dropdown.classList.add('hidden');
        }
      });
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        document.querySelectorAll('[data-dropdown-menu]').forEach(function(dropdown) {
          dropdown.classList.add('hidden');
        });
      }
    });

    // Mobile slide-out nav drawer — mirrors the modal's backdrop-click/Escape pattern above,
    // but runs independently since the drawer is static per-pageload (no htmx round-trip).
    function openMobileDrawer() {
      const drawer = document.getElementById('mobile-drawer');
      const backdrop = document.getElementById('mobile-drawer-backdrop');
      const panel = document.getElementById('mobile-drawer-panel');
      if (!drawer || !backdrop || !panel) return;
      drawer.classList.remove('pointer-events-none');
      drawer.setAttribute('aria-hidden', 'false');
      backdrop.classList.add('opacity-100');
      panel.classList.remove('-translate-x-full');
      document.body.classList.add('overflow-hidden');
    }

    function closeMobileDrawer() {
      const drawer = document.getElementById('mobile-drawer');
      const backdrop = document.getElementById('mobile-drawer-backdrop');
      const panel = document.getElementById('mobile-drawer-panel');
      if (!drawer || !backdrop || !panel) return;
      backdrop.classList.remove('opacity-100');
      panel.classList.add('-translate-x-full');
      document.body.classList.remove('overflow-hidden');
      setTimeout(() => {
        drawer.classList.add('pointer-events-none');
        drawer.setAttribute('aria-hidden', 'true');
      }, 300);
    }

    function toggleMobileDrawer() {
      const panel = document.getElementById('mobile-drawer-panel');
      if (!panel) return;
      if (panel.classList.contains('-translate-x-full')) {
        openMobileDrawer();
      } else {
        closeMobileDrawer();
      }
    }

    document.addEventListener('click', function(event) {
      if (event.target.id === 'mobile-drawer-backdrop') {
        closeMobileDrawer();
      }
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        const panel = document.getElementById('mobile-drawer-panel');
        if (panel && !panel.classList.contains('-translate-x-full')) {
          closeMobileDrawer();
        }
      }
    });

    // Mobile account bottom sheet — same backdrop-click/Escape pattern as the
    // nav drawer above, but slides up from the bottom instead of in from the side.
    function openAccountSheet() {
      const sheet = document.getElementById('account-sheet');
      const backdrop = document.getElementById('account-sheet-backdrop');
      const panel = document.getElementById('account-sheet-panel');
      if (!sheet || !backdrop || !panel) return;
      sheet.classList.remove('pointer-events-none');
      sheet.setAttribute('aria-hidden', 'false');
      backdrop.classList.add('opacity-100');
      panel.classList.remove('translate-y-full');
      document.body.classList.add('overflow-hidden');
    }

    function closeAccountSheet() {
      const sheet = document.getElementById('account-sheet');
      const backdrop = document.getElementById('account-sheet-backdrop');
      const panel = document.getElementById('account-sheet-panel');
      if (!sheet || !backdrop || !panel) return;
      backdrop.classList.remove('opacity-100');
      panel.classList.add('translate-y-full');
      document.body.classList.remove('overflow-hidden');
      setTimeout(() => {
        sheet.classList.add('pointer-events-none');
        sheet.setAttribute('aria-hidden', 'true');
      }, 300);
    }

    document.addEventListener('click', function(event) {
      if (event.target.id === 'account-sheet-backdrop') {
        closeAccountSheet();
      }
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        const panel = document.getElementById('account-sheet-panel');
        if (panel && !panel.classList.contains('translate-y-full')) {
          closeAccountSheet();
        }
      }
    });
  </script>
</body>
</html>
