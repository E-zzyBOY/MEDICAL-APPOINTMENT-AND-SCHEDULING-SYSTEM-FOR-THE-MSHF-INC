<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MSHFI Medical Appointment System{% endblock %}</title>
  <script>
    // Back/Forward navigation can restore a page from the browser's
    // in-memory bfcache without making a new request at all, bypassing the
    // server's Cache-Control headers entirely. Forcing a reload whenever a
    // page is restored this way guarantees a fresh request hits the server,
    // so a dead session gets redirected to login instead of showing stale content.
    window.addEventListener('pageshow', function (event) {
      if (event.persisted) {
        window.location.reload();
      }
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/js/htmx.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Fixed brand palette — same 4 colors used across every role's portal.
            brand: {
              900: '#112E81',
              700: '#4647AE',
              500: '#4382DF',
              200: '#AACCD6',
              50:  '#EEF4FA', // derived light tint of brand-200, for subtle surfaces only
            },
          },
          keyframes: {
            'fade-up': {
              '0%':   { opacity: 0, transform: 'translateY(6px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
          },
          animation: {
            'fade-up': 'fade-up 0.35s ease-out both',
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/custom.css" />
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <!-- Flash Messages -->
  {% if messages %}
  <div class="fixed top-4 right-4 z-50 space-y-2 max-w-sm w-full">
    {% for message in messages %}
    <div class="flex items-start gap-3 px-4 py-3 rounded-lg shadow-lg
      {% if message.tags == 'error' %}bg-red-500 text-white
      {% elif message.tags == 'success' %}bg-green-500 text-white
      {% elif message.tags == 'warning' %}bg-yellow-400 text-gray-900
      {% else %}bg-blue-500 text-white{% endif %}">
      <span class="flex-1 text-sm font-medium">{{ message }}</span>
      <button onclick="this.parentElement.remove()" class="text-white/80 hover:text-white font-bold leading-none">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Modal Root Container -->
  <div id="modal-root"></div>

  {% block body %}{% endblock %}

  {% block extra_js %}{% endblock %}

  <script>
    // Modal management: open/close, focus trap, and htmx triggers
    let modalTrigger = null;

    function getFocusable(container) {
      return Array.from(container.querySelectorAll(
        'a[href], button:not([disabled]), textarea, input:not([type="hidden"]), select, [tabindex]:not([tabindex="-1"])'
      ));
    }

    function openModal() {
      const modal = document.getElementById('modal-overlay');
      if (!modal) return;
      modal.classList.add('open');
      const focusables = getFocusable(modal);
      (focusables[0] || modal).focus();
    }

    function closeModal() {
      const modal = document.getElementById('modal-overlay');
      if (modal) {
        modal.classList.remove('open');
        setTimeout(() => {
          document.getElementById('modal-root').innerHTML = '';
          if (modalTrigger && document.body.contains(modalTrigger)) {
            modalTrigger.focus();
          }
          modalTrigger = null;
        }, 300); // Match transition duration
      }
    }

    // Remember what had focus before a modal-opening htmx request fires,
    // so closeModal() can restore it (keyboard users would otherwise land on <body>).
    document.body.addEventListener('htmx:beforeRequest', function(event) {
      if (event.detail.target && event.detail.target.id === 'modal-root') {
        modalTrigger = document.activeElement;
      }
    });

    // Close modal on backdrop click
    document.addEventListener('click', function(event) {
      const modal = document.getElementById('modal-overlay');
      if (event.target === modal) {
        closeModal();
      }
    });

    // Close on Escape key; trap Tab focus while a modal is open
    document.addEventListener('keydown', function(event) {
      const modal = document.getElementById('modal-overlay');
      if (!modal || !modal.classList.contains('open')) return;

      if (event.key === 'Escape') {
        closeModal();
        return;
      }
      if (event.key !== 'Tab') return;

      const focusables = getFocusable(modal);
      if (focusables.length === 0) return;
      const first = focusables[0];
      const last = focusables[focusables.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    });

    // Auto-open modal when content is swapped into #modal-root
    document.body.addEventListener('htmx:afterSettle', function(event) {
      if (event.detail.target.id === 'modal-root') {
        openModal();
      }
    });

    // Top-right avatar dropdown — independent of the modal system above.
    function toggleUserMenu() {
      const dropdown = document.getElementById('user-menu-dropdown');
      if (dropdown) dropdown.classList.toggle('hidden');
    }

    document.addEventListener('click', function(event) {
      const menu = document.getElementById('user-menu');
      const dropdown = document.getElementById('user-menu-dropdown');
      if (menu && dropdown && !menu.contains(event.target)) {
        dropdown.classList.add('hidden');
      }
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        const dropdown = document.getElementById('user-menu-dropdown');
        if (dropdown) dropdown.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
