{# Account popover menu items — shared by the desktop top-right avatar dropdown and the mobile bottom-tab account popover. #}
<a href="/accounts/profile/" class="block mx-1.5 px-3 py-2 text-sm text-ink-soft rounded-xl hover:bg-softgray hover:text-ink transition-colors">My Profile</a>
<a href="/accounts/settings/" class="block mx-1.5 px-3 py-2 text-sm text-ink-soft rounded-xl hover:bg-softgray hover:text-ink transition-colors">Settings</a>
<a href="/accounts/help/" class="block mx-1.5 px-3 py-2 text-sm text-ink-soft rounded-xl hover:bg-softgray hover:text-ink transition-colors">Help &amp; Support</a>
{% if request.user.role == 'patient' %}
<a href="/feedback/" class="block mx-1.5 px-3 py-2 text-sm text-ink-soft rounded-xl hover:bg-softgray hover:text-ink transition-colors">Feedback</a>
{% endif %}
<hr class="my-1.5 border-gray-100">
<form method="post" action="/accounts/logout/">
  {% csrf_token %}
  <button type="submit" class="w-full text-left block mx-1.5 px-3 py-2 text-sm text-red-600 rounded-xl hover:bg-red-50 transition-colors" style="width: calc(100% - 0.75rem);">Sign Out</button>
</form>
