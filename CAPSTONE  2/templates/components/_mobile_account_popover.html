{# Mobile bottom-tab "Menu" item — opens a bottom sheet (profile header, Details, Others, Sign Out) instead of a dropdown. #}
{% load static %}
<div class="relative flex-1 h-full" id="mobile-account-menu">
  <button type="button" onclick="openAccountSheet()" aria-label="Account menu" aria-haspopup="dialog" class="flex flex-col items-center justify-center gap-0.5 w-full h-full text-slate-500 hover:text-brand-700">
    {% if request.user.profile_picture %}
      <img src="{{ request.user.profile_picture.url }}" class="size-6 rounded-full object-cover" alt="">
    {% else %}
      <img src="{% static 'img/default-avatar.svg' %}" class="size-6 rounded-full object-cover" alt="">
    {% endif %}
    <span class="text-[11px] font-medium">Menu</span>
  </button>
</div>

{% include "components/_mobile_account_sheet.html" %}
