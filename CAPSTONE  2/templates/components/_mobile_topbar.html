{% load static %}
{# Mobile-only top bar — shown below md:. The desktop page-title header stays untouched above md:. #}
<header class="md:!hidden flex items-center justify-between gap-3 px-4 py-3 bg-white border-b border-gray-100 flex-shrink-0">
  <div class="flex items-center gap-2.5">
    <img src="{% static 'img/mshfi-logo.jpg' %}" alt="MSHFI seal" class="size-9 shrink-0 rounded-full object-cover" />
    <span class="font-semibold text-ink text-base leading-tight">MSHFI</span>
  </div>
  <div class="flex items-center gap-1">
    <a href="/notifications/" {% if request.path != '/notifications/' %}hx-get="/notifications/panel/" hx-target="#modal-root" hx-swap="innerHTML"{% endif %} aria-label="Notifications" class="relative flex size-10 items-center justify-center rounded-full {% if request.path == '/notifications/' %}bg-brand-100 text-brand-600{% else %}text-ink-soft{% endif %} hover:bg-brand-50 hover:text-brand-600 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      {% if unread_notification_count > 0 %}
      <span class="absolute top-1 right-1 min-w-[16px] h-4 px-1 flex items-center justify-center rounded-full bg-danger text-white text-[10px] font-semibold leading-none ring-2 ring-white">{{ unread_notification_count }}</span>
      {% endif %}
    </a>

  </div>
</header>
