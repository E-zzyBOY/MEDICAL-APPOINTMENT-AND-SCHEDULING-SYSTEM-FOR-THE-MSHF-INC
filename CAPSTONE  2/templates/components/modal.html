{# Reusable Modal Shell — usage: {% extends "components/modal.html" %} + {% block modal_content %}...{% endblock %}, passing title (and optionally content_class) into the render context. #}
<div id="modal-overlay" class="fixed inset-0 bg-black/50 z-40 transition-opacity opacity-0" style="transition-duration: 300ms;" role="dialog" aria-modal="true" aria-labelledby="modal-title" tabindex="-1">
  <div class="fixed inset-0 z-40 overflow-y-auto flex items-center justify-center">
    <div class="w-full {{ content_class|default:'max-w-md' }} mx-4 my-8">
      <div class="bg-white rounded-xl shadow-xl">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
          <h2 id="modal-title" class="text-lg font-bold text-gray-800">{{ title }}</h2>
          <button type="button" onclick="closeModal()" aria-label="Close" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 text-2xl leading-none">&times;</button>
        </div>
        <!-- Content -->
        <div class="px-6 py-6">
          {% block modal_content %}{% endblock %}
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  #modal-overlay.open {
    opacity: 1 !important;
  }
</style>
