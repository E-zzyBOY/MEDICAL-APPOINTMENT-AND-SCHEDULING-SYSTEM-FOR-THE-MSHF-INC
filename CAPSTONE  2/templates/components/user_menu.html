{# Top-right avatar dropdown — shared across all 4 role base templates. Independent of the modal system. #}
{% load static %}
<div class="relative" id="user-menu">
  <button type="button" onclick="toggleDropdown('user-menu-dropdown')" class="flex items-center gap-3 cursor-pointer rounded-full pl-1 pr-2 py-1 hover:bg-softgray transition-colors">
    {% if request.user.profile_picture %}
      <img src="{{ request.user.profile_picture.url }}" class="size-9 rounded-full object-cover ring-2 ring-brand-100" alt="">
    {% else %}
      <img src="{% static 'img/default-avatar.svg' %}" class="size-9 rounded-full object-cover ring-2 ring-brand-100" alt="">
    {% endif %}
    <div class="text-sm leading-tight text-left hidden lg:block">
      <p class="font-medium text-ink">{% if request.user.role == 'doctor' %}Dr. {% endif %}{{ request.user.get_full_name|default:request.user.username }}</p>
      <p class="text-ink-soft text-xs capitalize">{{ request.user.role }}</p>
    </div>
    <svg class="w-4 h-4 text-gray-400 hidden lg:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
  </button>
  <div id="user-menu-dropdown" data-dropdown-menu data-trigger="user-menu" class="hidden animate-scale-in absolute right-0 mt-2 w-52 bg-white rounded-2xl shadow-soft-lg border border-gray-100 py-1.5 z-50">
    {% include "components/_account_popover_menu.html" %}
  </div>
</div>
